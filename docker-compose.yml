version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: interseguro-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interseguro-nodejs-api
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/auth_db?schema=public
      - JWT_SECRET=secret
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push && npx prisma db seed && npm run start:prod"

volumes:
  pgdata: